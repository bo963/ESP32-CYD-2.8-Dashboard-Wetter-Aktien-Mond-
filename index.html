<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>ESP32 Installer</title>
  <script>
    // Wir bauen den Link hier zusammen, damit GitHub ihn nicht kuerzen kann
    const teil1 = "https://unpkg.com";
    const teil2 = "esp-web-tools@10/dist/web-install-button.js";
    const script = document.createElement('script');
    script.type = 'module';
    script.src = teil1 + teil2;
    document.head.appendChild(script);
  </script>
</head>
<body style="font-family:sans-serif; background:#121212; color:white; text-align:center; padding:50px;">
  <h1>ESP32 Installation</h1>
  <div style="background:#1e1e1e; padding:20px; border-radius:10px; display:inline-block; margin-bottom:20px;">
    1. ESP32 anschließen | 2. Chrome nutzen | 3. Button klicken
  </div><br>
  <esp-web-install-button manifest="./manifest.json">
    <button slot="activate" style="background:#28a745; color:white; border:none; padding:15px 30px; border-radius:8px; cursor:pointer;">
      Verbinden & Installieren
    </button>
  </esp-web-install-button>
</body>
</html>
