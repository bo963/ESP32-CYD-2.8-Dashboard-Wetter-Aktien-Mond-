<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 CYD Dashboard Installer</title>
    
    <!-- Stabiler, offizieller Link ohne CORS-Probleme -->
    <script type="module" src="https://unpkg.com"></script>

    <style>
        body { font-family: sans-serif; background-color: #121212; color: #e0e0e0; text-align: center; padding: 40px; }
        .box { background: #1e1e1e; padding: 25px; border-radius: 12px; border: 1px solid #333; display: inline-block; text-align: left; margin-bottom: 30px; }
        button { background-color: #28a745; color: white; border: none; padding: 15px 30px; font-size: 18px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #218838; }
    </style>
</head>
<body>

    <h1>Installation</h1>
    <div class="box">
        1. Connect ESP32 via USB cable<br>
        2. Use Chrome or Edge browser<br>
        3. Click the button below
    </div><br>

    <!-- Der Web-Installer Button -->
    <esp-web-install-button manifest="manifest.json">
        <button slot="activate">Connect & Install Stock Tracker</button>
    </esp-web-install-button>

    <p style="margin-top: 50px; color: #666; font-size: 0.8em;">
        Works only in Google Chrome or Microsoft Edge via USB.
    </p>

</body>
</html>
