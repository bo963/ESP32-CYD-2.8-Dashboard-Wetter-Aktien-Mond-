<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ESP32 Installer</title>
  
  <!-- STYLE VOR BASE (damit es lokal bleibt) -->
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #121212; color: white; text-align: center; padding: 50px 20px; margin: 0; }
    .container { background: #1e1e1e; padding: 25px; border-radius: 12px; 
      display: inline-block; margin-bottom: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
    h1 { margin-bottom: 30px; color: #00e676; }
    button[slot="activate"] { background: #28a745; color: white; border: none; 
      padding: 15px 35px; border-radius: 8px; font-size: 1.2em; font-weight: bold; 
      cursor: pointer; transition: background 0.3s; }
    button[slot="activate"]:hover { background: #218838; }
  </style>
  
  <!-- BASE NACH Style (nur für JS) -->
  <base href="https://unpkg.com/esp-web-tools@10/">
  <script type="module" src="dist/web/install-button.js?module"></script>
</head>
<body>
  <h1>ESP32 Installation</h1>
  <div class="container">
    1. ESP32 anschließen | 2. Chrome/Edge nutzen | 3. Button klicken
  </div>
  <br>
  
  <esp-web-install-button manifest="./manifest.json">
    <button slot="activate">Verbinden & Installieren</button>
  </esp-web-install-button>
  
  <p style="margin-top: 40px; color: #888; font-size: 0.9em;">
    Hinweis: Funktioniert nur in Chromium-basierten Browsern (Chrome, Edge, Opera).<br>
    Stellen Sie sicher, dass keine andere Software den COM-Port blockiert.
  </p>
</body>
</html>
