<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 CYD Installer</title>
    <!-- Wir nutzen eine alternative, stabilere Quelle für das Skript -->
    <script type="module" src="https://unpkg.com"></script>
    <style>
        body { font-family: sans-serif; background-color: #121212; color: white; text-align: center; padding: 40px; }
        .box { background: #1e1e1e; padding: 20px; border-radius: 12px; display: inline-block; text-align: left; border: 1px solid #333; }
        button { background: #28a745; color: white; border: none; padding: 15px 30px; border-radius: 8px; font-size: 18px; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>
    <h1>Installation</h1>
    <div class="box">
        1. Connect ESP32 via USB<br>
        2. Use Chrome or Edge<br>
        3. Click Connect & Install
    </div><br>

    <!-- WICHTIG: manifest ohne ./ davor -->
    <esp-web-install-button manifest="manifest.json">
        <button slot="activate">Connect & Install Stock Tracker</button>
    </esp-web-install-button>
</body>
</html>
