<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <title>ESP32 Installer</title>
  <!-- Diese Zeile MUSS exakt so aussehen - achte darauf, dass sie beim Speichern nicht umgebrochen wird -->
  <script type="module" src="https://unpkg.com"></script>

  
  <style>
    body { font-family: sans-serif; background: #121212; color: white; text-align: center; padding: 50px; }
    .box { background: #1e1e1e; padding: 20px; border: 1px solid #333; border-radius: 10px; display: inline-block; margin-bottom: 20px; }
    button { background: #28a745; color: white; border: none; padding: 15px 30px; border-radius: 8px; font-size: 1.2em; cursor: pointer; }
    button:hover { background: #218838; }
  </style>
</head>
<body>
  <h1>Installation</h1>
  <div class="box">
    1. Verbinde den ESP32 per USB-Kabel<br>
    2. Nutze Chrome oder Edge Browser<br>
    3. Klicke auf den Button unten
  </div><br>

  <esp-web-install-button manifest="manifest.json">
    <button slot="activate">Connect & Install Stock Tracker</button>
  </esp-web-install-button>
</body>
</html>
